name: Release

# Trigger on pushed version tags — e.g. v1.0.0, v2.1.3
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create a GitHub Release and upload assets

# ---------------------------------------------------------------------------
# Job 1 — Build the Obsidian plugin (TypeScript → main.js)
# ---------------------------------------------------------------------------
jobs:
  build-plugin:
    name: Build Obsidian plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"
          cache-dependency-path: >-
            vault/choracle-remote-00/.obsidian/plugins/zettlebank/package-lock.json

      - name: Install dependencies
        working-directory: vault/choracle-remote-00/.obsidian/plugins/zettlebank
        run: npm install

      - name: Build plugin
        working-directory: vault/choracle-remote-00/.obsidian/plugins/zettlebank
        run: npm run build

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin
          path: |
            vault/choracle-remote-00/.obsidian/plugins/zettlebank/main.js
            vault/choracle-remote-00/.obsidian/plugins/zettlebank/manifest.json
            vault/choracle-remote-00/.obsidian/plugins/zettlebank/styles.css

# ---------------------------------------------------------------------------
# Job 2 — Build standalone executables (Windows + Linux, in parallel)
# ---------------------------------------------------------------------------
  build-exe:
    name: Build server executable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: zettlebank-server-windows
            archive-file: zettlebank-server-windows.zip
          - os: ubuntu-latest
            artifact-name: zettlebank-server-linux
            archive-file: zettlebank-server-linux.tar.gz
          - os: macos-latest
            artifact-name: zettlebank-server-macos
            archive-file: zettlebank-server-macos.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Python 3.12 — most stable release for the full ML dependency stack
      # (spaCy + leidenalg + BERTopic).  3.11 and 3.13 are also supported
      # per CLAUDE.md but 3.12 has the widest pre-built wheel coverage.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Download the spaCy CPU model used by the server (en_core_web_sm).
      # en_core_web_trf is excluded — curated-tokenizers fails to compile on
      # Python 3.13/Windows and is not required (server falls back to sm).
      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller build.spec

      # Archive the one-folder output so it can be attached to the release
      - name: Archive dist folder (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/zettlebank-server -DestinationPath zettlebank-server-windows.zip

      - name: Archive dist folder (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          tar -czf zettlebank-server-linux.tar.gz -C dist zettlebank-server

      - name: Archive dist folder (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          tar -czf zettlebank-server-macos.tar.gz -C dist zettlebank-server

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.archive-file }}

# ---------------------------------------------------------------------------
# Job 3 — Collect all artifacts and publish the GitHub Release
# ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-plugin, build-exe]

    steps:
      - name: Download Obsidian plugin
        uses: actions/download-artifact@v4
        with:
          name: obsidian-plugin
          path: release-assets/plugin

      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: zettlebank-server-windows
          path: release-assets

      - name: Download Linux executable
        uses: actions/download-artifact@v4
        with:
          name: zettlebank-server-linux
          path: release-assets

      - name: Download macOS executable
        uses: actions/download-artifact@v4
        with:
          name: zettlebank-server-macos
          path: release-assets

      - name: Publish release and attach assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-assets/plugin/main.js
            release-assets/plugin/manifest.json
            release-assets/plugin/styles.css
            release-assets/zettlebank-server-windows.zip
            release-assets/zettlebank-server-linux.tar.gz
            release-assets/zettlebank-server-macos.tar.gz
