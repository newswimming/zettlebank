name: Release

# Trigger on pushed version tags — e.g. v0.1.0, v1.2.3
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create/draft a GitHub Release and upload assets

jobs:
  build-and-release:
    name: Build plugin and draft release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository at the pushed tag
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Provision Node.js 18.x with npm cache
      # -----------------------------------------------------------------------
      - name: Set up Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"
          cache-dependency-path: >-
            vault/choracle-remote-00/.obsidian/plugins/zettlebank/package-lock.json

      # -----------------------------------------------------------------------
      # 3. Install frontend dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        working-directory: vault/choracle-remote-00/.obsidian/plugins/zettlebank
        run: npm install

      # -----------------------------------------------------------------------
      # 4. Build the Obsidian plugin (tsc type-check + esbuild bundle)
      # -----------------------------------------------------------------------
      - name: Build plugin
        working-directory: vault/choracle-remote-00/.obsidian/plugins/zettlebank
        run: npm run build

      # -----------------------------------------------------------------------
      # 5. Draft a GitHub Release and attach the three distributable files
      # -----------------------------------------------------------------------
      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            vault/choracle-remote-00/.obsidian/plugins/zettlebank/main.js
            vault/choracle-remote-00/.obsidian/plugins/zettlebank/manifest.json
            vault/choracle-remote-00/.obsidian/plugins/zettlebank/styles.css
